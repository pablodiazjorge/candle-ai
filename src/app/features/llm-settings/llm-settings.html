<div class="llm-settings-trigger">
  <button class="settings-btn" (click)="toggle()" [attr.aria-label]="'llm.settings' | translate">
    ⚙️
    @if (!store.isConfigured()) {
      <span class="badge">!</span>
    }
  </button>
</div>

@if (isOpen()) {
  <div class="settings-overlay" (click)="close()">
    <div class="settings-panel" (click)="$event.stopPropagation()">
      <div class="panel-header">
        <h2>{{ 'llm.settings' | translate }}</h2>
        <button class="close-btn" (click)="close()">✕</button>
      </div>

      <div class="panel-body">
        <!-- Preset selector -->
        <label class="field-label">{{ 'llm.provider' | translate }}</label>
        <select
          class="field-select"
          [ngModel]="store.activePresetName()"
          (change)="onPresetChange($event)"
        >
          @for (preset of store.presets(); track preset.name) {
            <option [value]="preset.name">{{ preset.name }}</option>
          }
        </select>

        <!-- Base URL -->
        <label class="field-label">{{ 'llm.baseUrl' | translate }}</label>
        <input
          type="text"
          class="field-input"
          [ngModel]="store.activeConfig().baseUrl"
          (ngModelChange)="store.setBaseUrl($event)"
          [placeholder]="'https://api.deepseek.com/v1'"
        />

        <!-- API Key -->
        <label class="field-label">{{ 'llm.apiKey' | translate }}</label>
        <div class="api-key-wrapper">
          <input
            [type]="showApiKey() ? 'text' : 'password'"
            class="field-input"
            [ngModel]="store.activeConfig().apiKey"
            (ngModelChange)="store.setApiKey($event)"
            [placeholder]="'sk-...'"
          />
          <button class="toggle-visibility" (click)="showApiKey.update(v => !v)">
            {{ showApiKey() ? '🙈' : '👁️' }}
          </button>
        </div>

        <!-- Model -->
        <label class="field-label">{{ 'llm.model' | translate }}</label>
        <input
          type="text"
          class="field-input"
          [ngModel]="store.activeConfig().model"
          (ngModelChange)="store.setModel($event)"
          [placeholder]="'deepseek-chat'"
        />

        <!-- Max tokens + Temperature -->
        <div class="field-row">
          <div class="field-half">
            <label class="field-label">{{ 'llm.maxTokens' | translate }}</label>
            <input
              type="number"
              class="field-input"
              [ngModel]="store.activeConfig().maxTokens"
              (ngModelChange)="store.updateConfig({ maxTokens: $event })"
              min="256" max="8192" step="256"
            />
          </div>
          <div class="field-half">
            <label class="field-label">{{ 'llm.temperature' | translate }}</label>
            <input
              type="number"
              class="field-input"
              [ngModel]="store.activeConfig().temperature"
              (ngModelChange)="store.updateConfig({ temperature: $event })"
              min="0" max="2" step="0.1"
            />
          </div>
        </div>

        <!-- Test connection -->
        <button
          class="test-btn"
          (click)="testConnection()"
          [disabled]="testingConnection() || !store.isConfigured()"
        >
          @if (testingConnection()) {
            {{ 'llm.testing' | translate }}...
          } @else {
            {{ 'llm.testConnection' | translate }}
          }
        </button>

        @if (connectionStatus() === 'success') {
          <p class="status-msg success">{{ 'llm.connectionOk' | translate }}</p>
        }
        @if (connectionStatus() === 'error') {
          <p class="status-msg error">{{ 'llm.connectionFailed' | translate }}</p>
        }

        <!-- Info about local servers -->
        <div class="info-box">
          <p>{{ 'llm.localInfo' | translate }}</p>
        </div>
      </div>
    </div>
  </div>
}
