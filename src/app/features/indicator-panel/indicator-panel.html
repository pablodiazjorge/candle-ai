<div class="indicator-panel">
  <div class="panel-header">
    <h3 class="panel-title">{{ 'indicator.title' | translate }}</h3>
    @if (hasActiveIndicators) {
      <button class="clear-btn" (click)="disableAll()" [attr.aria-label]="'indicator.clearAll' | translate">
        {{ 'indicator.clearAll' | translate }}
      </button>
    }
  </div>

  <div class="toggle-list">
    @for (t of toggles; track t.key) {
      <label class="toggle-row" [class.active]="store.activeIndicators()[t.key]">
        <div class="toggle-info">
          <span class="toggle-label">{{ t.label | translate }}</span>
          <span class="toggle-desc">{{ t.description | translate }}</span>
        </div>
        <div class="toggle-switch">
          <input
            type="checkbox"
            [checked]="store.activeIndicators()[t.key]"
            (change)="toggle(t.key)"
            class="toggle-input"
          />
          <span class="toggle-slider"></span>
        </div>
      </label>
    }
  </div>
</div>
