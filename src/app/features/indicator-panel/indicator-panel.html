<div class="indicator-panel" role="region" aria-labelledby="indicators-panel-title">
  <div class="panel-header">
    <h3 id="indicators-panel-title" class="panel-title">{{ 'indicator.title' | translate }}</h3>
    @if (hasActiveIndicators) {
      <button class="clear-btn" (click)="disableAll()" [attr.aria-label]="'indicator.clearAll' | translate">
        {{ 'indicator.clearAll' | translate }}
      </button>
    }
  </div>

  <div class="toggle-list" role="list">
    @for (t of toggles; track t.key) {
      <div class="toggle-row" role="listitem">
        <div class="toggle-info">
          <span class="toggle-label" [id]="'toggle-label-' + t.key">{{ t.label | translate }}</span>
          <span class="toggle-desc" [id]="'toggle-desc-' + t.key">{{ t.description | translate }}</span>
        </div>
        <div class="toggle-switch">
          <input
            type="checkbox"
            role="switch"
            [checked]="store.activeIndicators()[t.key]"
            (change)="toggle(t.key)"
            [attr.aria-labelledby]="'toggle-label-' + t.key"
            [attr.aria-describedby]="'toggle-desc-' + t.key"
          />
          <span class="toggle-slider" aria-hidden="true"></span>
        </div>
      </div>
    }
  </div>
</div>
